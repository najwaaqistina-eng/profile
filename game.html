<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Challenge | Qistina Najwa</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS Tambahan Khas untuk Reka Bentuk Kotak Game Sahaja */
        .game-container {
            max-width: 600px;
            margin: 20px auto;
            text-align: center;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .progress-container {
            width: 100%;
            background: #e2e8f0;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #3b82f6;
            transition: width 0.3s;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .card {
            aspect-ratio: 1;
            background: #2563eb;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            user-select: none;
            transition: background 0.2s, transform 0.2s;
        }
        .card:hover { transform: scale(1.05); }
        .card.flipped { background: #3b82f6; }
        .card.matched { background: #10b981; cursor: default; }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="game.html" class="active">Game</a></li>
        </ul>
    </nav>

    <div class="page-wrapper game-container">
        <h1>Memory Challenge</h1>
        <p id="countdown">Memorize the cards : 5s</p>
        
        <div class="stats-panel">
            <div>Timer: <span id="timer">0s</span></div>
            <div>Matches: <span id="matches">0/8</span></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <footer>
        <p>&copy; 2026 Qistina Najwa | DFI20433 Web Development</p>
    </footer>

    <script>
        // Logik JavaScript asal Game Memori anda dikekalkan di sini
        const symbols = ["🍎","🍎","🍌","🍌","🍇","🍇","🍓","🍓","🍊","🍊","🍉","🍉","🍍","🍍","🥝","🥝"];
        let shuffled = symbols.sort(() => Math.random() - 0.5);
        let firstCard = null, secondCard = null;
        let lockBoard = false, matches = 0, seconds = 0;
        let previewMode = true;

        const grid = document.getElementById("grid");
        shuffled.forEach((symbol) => {
            const card = document.createElement("div");
            card.classList.add("card", "flipped");
            card.dataset.symbol = symbol;
            card.innerHTML = symbol;
            card.addEventListener("click", flipCard);
            grid.appendChild(card);
        });

        function flipCard() {
            if (lockBoard || previewMode || this === firstCard || this.classList.contains("matched")) return;
            this.classList.add("flipped");
            this.innerHTML = this.dataset.symbol;

            if (!firstCard) {
                firstCard = this;
            } else {
                secondCard = this;
                checkMatch();
            }
        }

        function checkMatch() {
            if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
                firstCard.classList.add("matched");
                secondCard.classList.add("matched");
                matches++;
                document.getElementById("matches").innerHTML = matches + "/8";
                document.getElementById("progressBar").style.width = (matches / 8) * 100 + "%";
                firstCard = null; secondCard = null;
                if (matches === 8) alert("Congratulations! You won in " + seconds + " seconds.");
            } else {
                lockBoard = true;
                setTimeout(() => {
                    firstCard.innerHTML = "?"; secondCard.innerHTML = "?";
                    firstCard.classList.remove("flipped"); secondCard.classList.remove("flipped");
                    firstCard = null; secondCard = null; lockBoard = false;
                }, 1000);
            }
        }

        let countdown = 5;
        const preview = setInterval(() => {
            document.getElementById("countdown").innerHTML = "Memorize the cards : " + countdown + "s";
            countdown--;
            if (countdown < 0) {
                clearInterval(preview);
                document.querySelectorAll(".card").forEach(card => {
                    card.innerHTML = "?";
                    card.classList.remove("flipped");
                });
                previewMode = false;
                document.getElementById("countdown").innerHTML = "Game Started!";
            }
        }, 1000);

        setInterval(() => {
            if (!previewMode && matches < 8) {
                seconds++;
                document.getElementById("timer").innerHTML = seconds + "s";
            }
        }, 1000);
    </script>
</body>
</html>
